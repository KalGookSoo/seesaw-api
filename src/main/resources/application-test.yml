spring:
  # DataSource
  h2:
    console:
      enabled: true
      path: /h2-console
  
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;
    # jdbc:h2:tcp://localhost:9092/mem:testdb;MODE=PostgreSQL; 로 DB Connection할 수 있음
    driver-class-name: org.h2.Driver
    username: tester
    password: tester
  
  jpa:
    hibernate:
      ddl-auto: create

