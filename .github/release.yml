# GitHub Auto‑generated Release Notes 설정 - SEESAW-API
# 문서: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      # 릴리스 노트에서 제외할 메타 라벨들
      - duplicate
      - question
  categories:
    - title: "✨ 새로운 API 기능 (New API Features)"
      labels:
        - enhancement
        - api

    - title: "🐛 API 버그 수정 (API Bug Fixes)"
      labels:
        - bug
        - api

    - title: "📝 API 문서 (API Documentation)"
      labels:
        - documentation
        - api

    - title: "⚙️ 기타 변경 (Other Changes)"
      labels:
        - "*"
