name: 버그 리포트 - API
description: BDD(Given/When/Then) 형식으로 재현/기대/실제 동작을 기술해 API 버그를 보고하세요.
title: "[API 버그] "
labels: [bug, api]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        감사합니다! 이 템플릿은 행위 주도 개발(BDD) 형식에 맞춰 API 버그를 명확히 기술하도록 돕습니다.
        - 핵심은 "Given/When/Then/But"(기대/실제) 구조입니다.
        - API 요청/응답 예시, 에러 로그 첨부 권장, 민감 정보는 마스킹하세요.
  - type: input
    id: scenario_title
    attributes:
      label: 시나리오 제목
      description: 어떤 상황의 버그인지 한 줄로 요약하세요.
      placeholder: 예) 사용자 목록 조회 API 페이징 오류
    validations:
      required: true
  - type: textarea
    id: given
    attributes:
      label: Given(전제 조건)
      description: 버그 재현 전 상태/데이터/환경. 계정/권한/사전 단계 등.
      placeholder: |
        예)
        - 인증된 사용자 토큰 보유
        - 데이터베이스에 100개의 사용자 데이터 존재
        - API 버전: v1
    validations:
      required: true
  - type: textarea
    id: when
    attributes:
      label: When(행동)
      description: API 호출 정보를 구체적으로 작성하세요.
      placeholder: |
        예)
        1) GET /api/v1/users?page=2&size=10
        2) Authorization: Bearer {token}
        3) Content-Type: application/json
    validations:
      required: true
  - type: textarea
    id: then_expected
    attributes:
      label: Then(기대 결과)
      description: 정상이라면 어떤 응답을 받아야 하는지.
      placeholder: |
        예) 
        - HTTP 200 OK
        - 10개의 사용자 데이터 반환
        - 페이지네이션 정보 포함
    validations:
      required: true
  - type: textarea
    id: but_actual
    attributes:
      label: But(실제 결과)
      description: 실제로 관찰된 결과를 정확히 적어 주세요.
      placeholder: |
        예) 
        - HTTP 500 Internal Server Error
        - 에러 메시지: "NullPointerException at UserService.getUsers"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 환경 정보
      description: API 버전, 서버 환경 등
      placeholder: |
        - API 버전: v1.2.3
        - 서버 환경: Production
        - Java 버전: 17
  - type: textarea
    id: request_response
    attributes:
      label: API 요청/응답 예시(선택)
      description: 실제 요청과 응답을 첨부해주세요.
      placeholder: |
        Request:
        ```
        GET /api/v1/users?page=2&size=10
        ```
        
        Response:
        ```json
        {
          "error": "Internal Server Error"
        }
        ```
  - type: textarea
    id: logs
    attributes:
      label: 관련 로그(선택)
      description: 스택 트레이스/서버 로그 등을 붙여넣어 주세요.
  - type: textarea
    id: notes
    attributes:
      label: 가능한 원인/해결 아이디어(선택)
      description: 원인 추정, 가설, 임시 우회 방법, 관련 이슈 링크 등.
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 이슈를 검색했습니다
          required: true
        - label: 재현 절차와 환경 정보를 기입했습니다
          required: true
