name: 기능 요청 - API
description: 새로운 API 기능/개선을 제안해 주세요.
title: "[API 기능] "
labels: [enhancement, api]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      description: 제안하는 API 기능을 한두 문장으로 요약해 주세요.
      placeholder: 예) 사용자 프로필 일괄 업데이트 API를 추가합니다.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 문제/배경
      description: 어떤 문제나 니즈 때문에 이 API가 필요한가요?
      placeholder: 예) 현재는 사용자 프로필을 하나씩만 업데이트할 수 있어 대량 업데이트 시 성능 문제가 발생합니다.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 API 설계
      description: API 엔드포인트, 메소드, 요청/응답 형식 등을 간단히 적어 주세요.
      placeholder: |
        예)
        - Endpoint: POST /api/v1/users/batch
        - Request Body: { "users": [{"id": 1, "name": "홍길동"}, ...] }
        - Response: { "updated": 10, "failed": 0 }
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 기대 효과/가치(선택)
      description: 이 API가 제공할 비즈니스/사용자 가치는 무엇인가요?
      placeholder: 예) 대량 업데이트 성능 개선, API 호출 횟수 감소.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 고려했던 대안(선택)
      description: 다른 접근이나 대안이 있었다면 적어 주세요.
    validations:
      required: false
  - type: textarea
    id: usecases
    attributes:
      label: 사용 사례/예시(선택)
      description: 실제 사용 시나리오나 API 호출 예시가 있으면 적어 주세요.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 추가 정보(선택)
      description: 관련 링크, 레퍼런스, 첨부 자료 등.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 제안을 검색했습니다
          required: true
        - label: API 설계와 기대 효과를 간단히 정리했습니다
          required: true
